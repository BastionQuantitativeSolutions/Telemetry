name: Daily Telemetry Update

on:
  schedule:
    - cron: '5 0 * * *'  # 00:05 UTC daily
  workflow_dispatch:      # Allow manual trigger

jobs:
  update-telemetry:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pyyaml

      - name: Fetch and sanitize telemetry
        run: |
          # This step runs the sanitiser against the previous day's data.
          # In production, this would pull from your local Cavalier instance
          # via a secure tunnel or API, then sanitize and commit.
          # For now, this is a placeholder that generates a daily stub.
          python scripts/generate_daily_stub.py

      - name: Commit and push
        run: |
          git config user.name "Bastion Bot"
          git config user.email "bot@bastionquantitativesolutions.com"
          git add .
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          git diff --staged --quiet || git commit -m "telemetry: daily update ${TIMESTAMP}"
          git push
